name: Build Gorm Images

on:
  workflow_dispatch:
    inputs:
      is_test:
        description: 'Test run'
        required: true
        type: boolean
        default: false

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to docker.io
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: docworld
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Login to Aliyuncs
        uses: docker/login-action@v2
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      - name: Copy Tools
        run: |
          cp -r tools ./gorm
        shell: bash
      - name: Get version
        uses: ikrong/actions-util@v1.0.0
        with:
          function: fetch
          params: '["https://api.github.com/repos/go-gorm/gorm/releases/latest","get",["tag_name"]]'
      - if: ${{ !inputs.is_test }}
        name: Build Gorm doc
        uses: docker/build-push-action@v4.0.0
        with:
          context: ./gorm/
          push: true
          tags: docworld/gorm:latest, docworld/gorm:${{ env.tag_name }}, registry.cn-beijing.aliyuncs.com/docworld/gorm:latest, registry.cn-beijing.aliyuncs.com/docworld/gorm:${{ env.tag_name }}
      - if: ${{ inputs.is_test }}
        name: Test Build Gorm doc
        uses: docker/build-push-action@v4.0.0
        with:
          context: ./gorm/
          push: true
          tags: registry.cn-beijing.aliyuncs.com/ikrong/docworld:gorm
  UpdateDockerDescription:
    needs: [Build]
    uses: ikrong/documents/.github/workflows/_updateDocker.yml@main
    with:
      repoName: gorm
    secrets: inherit